name: Portfolio News Monitor

on:
  schedule:
    # Every 6 hours: 06:00, 12:00, 18:00, 00:00 UTC
    - cron: '0 6,12,18,0 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests

      - name: Run Portfolio News Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_MONITOR_USER_ID: ${{ secrets.SUPABASE_MONITOR_USER_ID }}
        run: python3 portfolio_news_monitor.py || echo "Portfolio monitor failed"

      - name: Commit and Push
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add docs/portfolio_news.json docs/.portfolio_news_seen.json || echo "Nothing to add"
          git commit -m "chore: portfolio news update $(date +%Y-%m-%d\ %H:%M)" || echo "No changes"
          git pull --rebase origin main && git push || echo "Push failed"

      - name: Trigger GitHub Pages Deployment
        if: always()
        run: gh workflow run pages-deploy.yml || echo "Pages deploy trigger failed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

env:
  PYTHONUNBUFFERED: 1
